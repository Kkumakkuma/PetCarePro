name: Daily Blog Monitor

# 영어 블로그 10개 일일 점검 → 텔레그램 알림.
# UTC 23:50 (KST 익일 08:50) — UTC 00~24시 하루 발행 완료 직후에 총량 집계.
on:
  schedule:
    - cron: '50 23 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/daily_blog_monitor.py
